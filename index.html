<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tezgâh — Yönetim Paneli</title>
<!-- CSS aynı kalacak, sadece arayüz mantığı güçlendirildi -->
<style>
    /* Tasarımını korudum, form genişletildi */
    .cart-item { background:var(--surface-2); padding:10px; margin-bottom:5px; border-radius:4px; display:flex; justify-content:space-between; align-items:center; }
</style>
</head>
<body>

<div class="app" id="appMain" style="display:flex;">
    <div class="main">
        <div class="content">
            <!-- SEPET MANTIKLI YENİ SATIŞ EKRANI -->
            <section class="tab-panel active" id="tab-satislar">
                <div class="panel">
                    <div class="panel-head"><h3>Yeni Satış (Sepet Sistemi)</h3></div>
                    <form class="form-grid" id="saleForm">
                        <div class="field span-2">
                            <label>Ürün</label>
                            <select class="input" id="saleProduct"></select>
                        </div>
                        <div class="field">
                            <label>Adet</label>
                            <input class="input" type="number" id="saleQty" value="1" min="1">
                        </div>
                        <button type="button" class="btn btn-primary" onclick="addToCart()">Sepete Ekle</button>
                        
                        <div class="field span-4">
                            <label>Sepet</label>
                            <div id="cartList"></div>
                            <div style="margin-top:10px; font-size:18px; font-weight:bold;">Toplam Tutar: <span id="cartTotal">₺0</span></div>
                        </div>

                        <div class="field span-2"><label>Müşteri Ad Soyad</label><input class="input" type="text" id="saleCustomer" required></div>
                        <div class="field span-2"><label>Telefon</label><input class="input" type="text" id="salePhone" required></div>
                        <div class="field full"><button type="submit" class="btn btn-success">Siparişi Tamamla</button></div>
                    </form>
                </div>
            </section>

            <!-- GİDER FİLTRELEME -->
            <section class="tab-panel" id="tab-giderler">
                <div class="toolbar">
                    <input type="date" id="expFilterStart" class="input">
                    <input type="date" id="expFilterEnd" class="input">
                    <button class="btn btn-sm" onclick="renderExpenses()">Filtrele</button>
                </div>
                <div id="expenseBody"></div>
            </section>

            <!-- SATIŞ GEÇMİŞİ FİLTRELEME -->
            <section class="tab-panel" id="tab-gecmis">
                <div class="toolbar">
                    <select id="histPaymentFilter" class="input">
                        <option value="all">Tüm Tipler</option>
                        <option value="Nakit">Nakit</option>
                        <option value="Kredi Kartı">Kredi Kartı</option>
                        <option value="Vadeli">Vadeli</option>
                    </select>
                </div>
                <tbody id="salesHistoryBody"></tbody>
            </section>

            <!-- VADELİ TOPLU MESAJ -->
            <section class="tab-panel" id="tab-vadeli">
                <button class="btn btn-sm" onclick="sendBulkWhatsapp()">Vadesi Gelenlere Toplu WhatsApp Mesajı</button>
                <div id="dueInstallmentsBody"></div>
            </section>
        </div>
    </div>
</div>

<script>
    let cart = [];

    // Sepete Ürün Ekleme
    function addToCart() {
        const pId = document.getElementById('saleProduct').value;
        const p = products.find(x=>x.id == pId);
        const qty = parseInt(document.getElementById('saleQty').value);
        cart.push({ ...p, cartQty: qty });
        renderCart();
    }

    function renderCart() {
        const list = document.getElementById('cartList');
        list.innerHTML = cart.map((item,i) => `<div class="cart-item">${item.name} x ${item.cartQty} - ₺${item.sell * item.cartQty} <button onclick="cart.splice(${i},1); renderCart()">X</button></div>`).join('');
        const total = cart.reduce((a,b) => a + (b.sell * b.cartQty), 0);
        document.getElementById('cartTotal').textContent = money(total);
    }

    // Toplu Mesaj Özelliği
    function sendBulkWhatsapp() {
        const targets = document.querySelectorAll('.due-item'); // Taksit listesindeki elementler
        targets.forEach(item => {
            const phone = item.dataset.phone;
            const msg = "Taksit ödemeniz vadesi gelmiştir...";
            window.open(`https://wa.me/90${phone.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`, '_blank');
        });
    }

    // Gider Filtreleme (Örnek)
    function renderExpenses() {
        const start = document.getElementById('expFilterStart').value;
        const end = document.getElementById('expFilterEnd').value;
        const filtered = expenses.filter(e => e.date >= start && e.date <= end);
        // Table güncellenir...
    }

    // Satış Geçmişi Tip Bazlı Filtreleme
    document.getElementById('histPaymentFilter').addEventListener('change', function() {
        const val = this.value;
        const filtered = val === 'all' ? sales : sales.filter(s => s.payment === val);
        // Tabloyu render et...
    });

    // Otomatik render fonksiyonları...
    function renderAll() {
        renderDashboard();
        renderVadeli();
        renderExpenses();
        renderSalesHistory();
    }
</script>
</body>
</html>
